services:
  postgres:
    image: postgres:17
    container_name: futmatch-postgres
    environment:
      POSTGRES_DB: futmatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: futmatch-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: 